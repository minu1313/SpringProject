<!DOCTYPE html>
<html>
<head th:replace="~{fragments/common/head :: HeadFragment}"></head>
<body>
<header th:replace="~{fragments/common/header :: HeaderFragment}"></header>

<nav th:replace="~{fragments/common/nav :: NavFragment}"></nav>

  <section class="container mt-4" style="height: 70vh">
    <div class="card text-center" style="height: 100%">
        <div class="card-header">
            <h2 id="fb-title">연락 답변하기</h2>
        </div>
        <div class="card-body">
            <div class="d-flex justify-content-center mb-3">
                <div class="mx-3">작성자: <span id="fb-writer" th:text="${posts.writerName}"></span></div>
                <div class="mx-3">이메일: <span id="fb-views" th:text="${posts.writerEmail}"></span></div>
                <div class="mx-3">작성일: <span id="fb-date" th:text="${posts.contactAskDTO.askDate}"></span></div>
            </div>
            <hr> 
            <div style="margin-top:20px; margin-bottom: 20px;">
                <p class="card-text">
                    문의 내용
                </p>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-center">
            <button class="btn btn-secondary mx-2" onclick="window.history.back()">뒤로가기</button>
            <button class="btn btn-primary mx-2">답변</button>
            <button class="btn btn-danger mx-2">삭제</button>
        </div>
    </div>
</section>
<footer th:replace="~{fragments/common/footer :: FooterFragment}"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
