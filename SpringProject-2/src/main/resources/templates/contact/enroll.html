<!DOCTYPE html>
<html>
<head th:replace="~{fragments/common/head :: HeadFragment}"></head>
<body>
<header th:replace="~{fragments/common/header :: HeaderFragment}"></header>

<nav th:replace="~{fragments/common/nav :: NavFragment}"></nav>

  <section id="contact">
    <h2>연락하기</h2>
    <p>문의사항이나 연락하고 싶은 내용을 작성하세요.</p>
    <form th:action="@{/contact/contactEnroll}" method="post">
        <label for="name">이름:</label>
        <input type="text" id="name" name="writerName" required>
        
        <label for="email">이메일:</label>
        <input type="email" id="email" name="writerEmail" required>
        
        <label for="message">메시지:</label>
        <textarea id="message" name="contactAskDTO.ask" rows="4" required></textarea>

        <p id="charCounter">0/500</p>

        <button type="submit">전송</button>
    </form>
  </section>
  <script>
    const messageInput = document.getElementById("message");
    const charCounter = document.getElementById("charCounter");

    messageInput.addEventListener("input", function() {
        const currentLength = messageInput.value.length;
        
        // 문자 수 카운터 업데이트
        charCounter.textContent = `${currentLength}/500`;
        
        // 최대 500자 제한
        if (currentLength > 500) {
            charCounter.classList.add("exceeded");  // 500자 초과 시 경고 표시
            messageInput.value = messageInput.value.substring(0, 500);  // 500자 이상 입력 방지
            charCounter.textContent = `500/500`;
        } else {
            charCounter.classList.remove("exceeded");  // 500자 이내면 경고 제거
        }
    });
</script>
<footer th:replace="~{fragments/common/footer :: FooterFragment}"></footer>
</body>
</html>
